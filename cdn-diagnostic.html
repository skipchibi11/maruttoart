<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDN Cache Diagnostic Tool - maruttoart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .json-output {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            max-height: 500px;
            overflow-y: auto;
        }
        .status-good { color: #198754; }
        .status-warning { color: #fd7e14; }
        .status-error { color: #dc3545; }
        .header-logo {
            font-size: 2rem;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
        <div class="container">
            <a class="navbar-brand header-logo" href="/">maruttoart</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">ホーム</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-lg-12">
                <h1 class="mb-4">CDN キャッシュ診断ツール</h1>
                <p class="text-muted">このツールはCDNのキャッシュ状況を診断し、パフォーマンス改善のための情報を提供します。</p>
                
                <div class="mb-4">
                    <button id="runDiagnostic" class="btn btn-primary me-2">診断を実行</button>
                    <button id="refreshDiagnostic" class="btn btn-outline-secondary">更新</button>
                </div>

                <!-- ステータス表示 -->
                <div id="statusCards" class="row mb-4" style="display: none;">
                    <div class="col-md-3 mb-3">
                        <div class="card">
                            <div class="card-body text-center">
                                <h5 class="card-title">CDN検出</h5>
                                <p id="cdnStatus" class="card-text">-</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <div class="card">
                            <div class="card-body text-center">
                                <h5 class="card-title">キャッシュヘッダー</h5>
                                <p id="cacheStatus" class="card-text">-</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <div class="card">
                            <div class="card-body text-center">
                                <h5 class="card-title">ETag</h5>
                                <p id="etagStatus" class="card-text">-</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3 mb-3">
                        <div class="card">
                            <div class="card-body text-center">
                                <h5 class="card-title">Last-Modified</h5>
                                <p id="modifiedStatus" class="card-text">-</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 推奨事項 -->
                <div id="recommendations" class="alert alert-info" style="display: none;">
                    <h5>推奨事項</h5>
                    <ul id="recommendationsList"></ul>
                </div>

                <!-- 詳細データ -->
                <div class="row">
                    <div class="col-12">
                        <h3>詳細診断データ</h3>
                        <div id="diagnosticOutput" class="json-output">
                            ここに診断結果が表示されます...
                        </div>
                    </div>
                </div>

                <div class="mt-4">
                    <h3>使用方法</h3>
                    <div class="row">
                        <div class="col-md-6">
                            <h5>ブラウザから</h5>
                            <code>https://marutto.art/cdn-test.php</code>
                        </div>
                        <div class="col-md-6">
                            <h5>コマンドラインから</h5>
                            <code>curl -s https://marutto.art/cdn-test.php | jq .</code>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function runDiagnostic() {
            document.getElementById('diagnosticOutput').textContent = '診断実行中...';
            
            fetch('/cdn-test.php')
                .then(response => response.json())
                .then(data => {
                    // 詳細データ表示
                    document.getElementById('diagnosticOutput').textContent = JSON.stringify(data, null, 2);
                    
                    // ステータスカード更新
                    document.getElementById('statusCards').style.display = 'block';
                    
                    // CDN検出
                    const cdnDetected = data.cache_analysis.cdn_detected;
                    const cdnStatusEl = document.getElementById('cdnStatus');
                    cdnStatusEl.textContent = cdnDetected ? '検出済み' : '未検出';
                    cdnStatusEl.className = 'card-text ' + (cdnDetected ? 'status-good' : 'status-warning');
                    
                    // キャッシュヘッダー
                    const cachePresent = data.cache_analysis.cache_control_present;
                    const cacheStatusEl = document.getElementById('cacheStatus');
                    cacheStatusEl.textContent = cachePresent ? '設定済み' : '未設定';
                    cacheStatusEl.className = 'card-text ' + (cachePresent ? 'status-good' : 'status-error');
                    
                    // ETag
                    const etagPresent = data.cache_analysis.etag_present;
                    const etagStatusEl = document.getElementById('etagStatus');
                    etagStatusEl.textContent = etagPresent ? '設定済み' : '未設定';
                    etagStatusEl.className = 'card-text ' + (etagPresent ? 'status-good' : 'status-warning');
                    
                    // Last-Modified
                    const modifiedPresent = data.cache_analysis.last_modified_present;
                    const modifiedStatusEl = document.getElementById('modifiedStatus');
                    modifiedStatusEl.textContent = modifiedPresent ? '設定済み' : '未設定';
                    modifiedStatusEl.className = 'card-text ' + (modifiedPresent ? 'status-good' : 'status-warning');
                    
                    // 推奨事項
                    const recommendations = data.cache_analysis.recommendations;
                    if (recommendations && recommendations.length > 0) {
                        document.getElementById('recommendations').style.display = 'block';
                        const listEl = document.getElementById('recommendationsList');
                        listEl.innerHTML = recommendations.map(rec => `<li>${rec}</li>`).join('');
                    } else {
                        document.getElementById('recommendations').style.display = 'none';
                    }
                })
                .catch(error => {
                    document.getElementById('diagnosticOutput').textContent = 'エラー: ' + error.message;
                });
        }
        
        // イベントリスナー
        document.getElementById('runDiagnostic').addEventListener('click', runDiagnostic);
        document.getElementById('refreshDiagnostic').addEventListener('click', runDiagnostic);
        
        // ページ読み込み時に自動実行
        document.addEventListener('DOMContentLoaded', runDiagnostic);
    </script>
</body>
</html>
