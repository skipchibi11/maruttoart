name: Deploy to Lolipop

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LOLIPOP_HOST }}
          username: ${{ secrets.LOLIPOP_USER }}
          password: ${{ secrets.LOLIPOP_PASSWORD }}
          port: 2222
          script: |
            cd /home/users/1/chu.jp-marutto/web/marutto.art
            git pull origin main