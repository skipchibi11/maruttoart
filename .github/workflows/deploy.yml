name: Deploy to Lolipop

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.LOLIPOP_HOST }}
          username: ${{ secrets.LOLIPOP_USER }}
          key: ${{ secrets.LOLIPOP_SSH_KEY }}
          script: |
            cd web/marutto.art/
            git pull origin main